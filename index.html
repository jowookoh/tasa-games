<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tasa Games 🎮</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <button id="back-btn" class="back-btn hidden" aria-label="Go back">
        <span class="back-icon">←</span>
      </button>
      <h1 class="logo">🎮 Tasa Games</h1>
    </header>

    <main id="main-content">
      <section id="home-screen" class="screen active">
        <h2 class="screen-title">Choose a Game!</h2>
        <div class="game-grid">
          <button class="game-card" data-game="memory">
            <span class="game-icon">🧠</span>
            <span class="game-name">Memory Match</span>
            <span class="game-desc">Find the pairs!</span>
          </button>
          <button class="game-card coming-soon" disabled>
            <span class="game-icon">🔢</span>
            <span class="game-name">Number Fun</span>
            <span class="game-desc">Coming soon!</span>
          </button>
          <button class="game-card coming-soon" disabled>
            <span class="game-icon">🎨</span>
            <span class="game-name">Color Quest</span>
            <span class="game-desc">Coming soon!</span>
          </button>
          <button class="game-card coming-soon" disabled>
            <span class="game-icon">🔤</span>
            <span class="game-name">Letter Land</span>
            <span class="game-desc">Coming soon!</span>
          </button>
        </div>
      </section>

      <section id="memory-game" class="screen game-screen">
        <div class="game-header">
          <div class="stat-box">
            <span class="stat-label">Moves</span>
            <span id="moves-count" class="stat-value">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Pairs</span>
            <span id="pairs-count" class="stat-value">0/8</span>
          </div>
        </div>
        
        <div class="difficulty-selector" id="difficulty-selector">
          <h3>Pick Difficulty</h3>
          <div class="difficulty-buttons">
            <button class="diff-btn" data-pairs="4">
              <span class="diff-icon">😊</span>
              <span>Easy</span>
              <span class="diff-detail">4 pairs</span>
            </button>
            <button class="diff-btn" data-pairs="6">
              <span class="diff-icon">🤔</span>
              <span>Medium</span>
              <span class="diff-detail">6 pairs</span>
            </button>
            <button class="diff-btn" data-pairs="8">
              <span class="diff-icon">🧐</span>
              <span>Hard</span>
              <span class="diff-detail">8 pairs</span>
            </button>
          </div>
        </div>

        <div id="memory-board" class="memory-board"></div>
        
        <button id="restart-btn" class="restart-btn hidden">
          🔄 Play Again
        </button>
      </section>

      <div id="win-modal" class="modal hidden">
        <div class="modal-content">
          <div class="confetti-container">
            <span class="confetti">🎉</span>
            <span class="confetti">⭐</span>
            <span class="confetti">🎊</span>
            <span class="confetti">✨</span>
            <span class="confetti">🌟</span>
          </div>
          <h2 class="win-title">🏆 You Won! 🏆</h2>
          <p class="win-stats">You found all pairs in <span id="final-moves">0</span> moves!</p>
          <div class="win-buttons">
            <button id="play-again-btn" class="action-btn primary">🔄 Play Again</button>
            <button id="home-btn" class="action-btn secondary">🏠 Home</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
